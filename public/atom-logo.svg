<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="atomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#5EEAD4"/>
    </linearGradient>
  </defs>
  
  <!-- Outer glow circle -->
  <circle cx="60" cy="60" r="55" fill="url(#glow)"/>
  
  <!-- Main circle background -->
  <circle cx="60" cy="60" r="45" fill="#0D1B2A"/>
  <circle cx="60" cy="60" r="45" stroke="url(#atomGradient)" stroke-width="2"/>
  
  <!-- Electron orbits -->
  <ellipse cx="60" cy="60" rx="35" ry="15" stroke="#06B6D4" stroke-width="1.5" fill="none" transform="rotate(-30 60 60)" opacity="0.7"/>
  <ellipse cx="60" cy="60" rx="35" ry="15" stroke="#22D3EE" stroke-width="1.5" fill="none" transform="rotate(30 60 60)" opacity="0.7"/>
  <ellipse cx="60" cy="60" rx="35" ry="15" stroke="#5EEAD4" stroke-width="1.5" fill="none" transform="rotate(90 60 60)" opacity="0.7"/>
  
  <!-- Nucleus -->
  <circle cx="60" cy="60" r="12" fill="url(#atomGradient)"/>
  <circle cx="60" cy="60" r="8" fill="#0D1B2A"/>
  <circle cx="60" cy="60" r="5" fill="#06B6D4"/>
  
  <!-- Electrons -->
  <circle cx="95" cy="60" r="4" fill="#22D3EE">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="35" r="4" fill="#5EEAD4">
    <animateTransform attributeName="transform" type="rotate" from="120 60 60" to="480 60 60" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="90" r="4" fill="#06B6D4">
    <animateTransform attributeName="transform" type="rotate" from="240 60 60" to="600 60 60" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
