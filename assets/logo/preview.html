<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0F172A;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            text-align: center;
        }
        .logo {
            width: 300px;
            height: 300px;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
            margin-top: 2rem;
            letter-spacing: 0.1em;
        }
        .tagline {
            color: #94A3B8;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="nucleux-logo-dark.svg" class="logo" alt="NucleuX Logo">
        <h1>NucleuX Academy</h1>
        <p class="tagline">Learn Atomically. Grow Exponentially.</p>
    </div>
</body>
</html>
