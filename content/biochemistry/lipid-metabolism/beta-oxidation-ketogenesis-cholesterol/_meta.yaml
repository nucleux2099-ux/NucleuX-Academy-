overview: >
  Beta-oxidation breaks down fatty acids to acetyl-CoA in mitochondria (requiring carnitine shuttle).
  Excess acetyl-CoA in liver produces ketone bodies (acetoacetate, Î˛-hydroxybutyrate, acetone) during
  fasting/starvation/uncontrolled diabetes. Cholesterol synthesis from acetyl-CoA is regulated by
  HMG-CoA reductase (target of statins). Dyslipidemias and fatty acid oxidation disorders are
  high-yield clinical topics.
  đź“š Harper's Biochemistry, 31st Ed, Ch.22-26; đź“š Stryer Biochemistry, Ch.22

learning_objectives:
  - Describe the carnitine shuttle and steps of beta-oxidation
  - Calculate ATP yield from complete oxidation of a fatty acid (e.g., palmitate)
  - Explain ketogenesis pathway, regulation, and clinical significance
  - Outline cholesterol synthesis pathway and its regulation by HMG-CoA reductase
  - Correlate lipid metabolism disorders with clinical presentations

content:
  atoms:
    - id: beta-oxidation
      title: "Beta-Oxidation of Fatty Acids"
      text: >
        Location: mitochondrial matrix. Long-chain FAs require carnitine shuttle (CPT-I on outer membrane = rate-limiting,
        inhibited by malonyl-CoA; CPT-II on inner membrane). Each cycle: oxidationâ†’hydrationâ†’oxidationâ†’thiolysis,
        removes 2-carbon acetyl-CoA units. Enzymes: acyl-CoA dehydrogenase (FAD), enoyl-CoA hydratase,
        Î˛-hydroxyacyl-CoA dehydrogenase (NAD+), thiolase. Each cycle yields: 1 FADH2, 1 NADH, 1 acetyl-CoA.
        Palmitate (C16): 7 cycles â†’ 8 acetyl-CoA, 7 FADH2, 7 NADH. Total ATP = 106 - 2 (activation) = 106 net.
        Medium/short-chain FAs enter mitochondria WITHOUT carnitine.
        đź“š Harper's Biochemistry, 31st Ed, Ch.22

    - id: ketogenesis
      title: "Ketogenesis"
      text: >
        Occurs in liver mitochondria when acetyl-CoA exceeds TCA capacity (low OAA from gluconeogenesis).
        Pathway: 2 acetyl-CoA â†’ acetoacetyl-CoA â†’ HMG-CoA (HMG-CoA synthase, rate-limiting) â†’
        acetoacetate (HMG-CoA lyase) â†’ Î˛-hydroxybutyrate (Î˛-HB dehydrogenase) or acetone (spontaneous).
        Ketone bodies are used by brain, heart, skeletal muscle (NOT liver â€” lacks thiophorase/succinyl-CoA transferase).
        Diabetic ketoacidosis: uncontrolled Type 1 DM â†’ â†‘lipolysis â†’ â†‘Î˛-oxidation â†’ â†‘â†‘ketone bodies â†’ metabolic acidosis.
        đź“š Harper's Biochemistry, 31st Ed, Ch.22

    - id: cholesterol-metabolism
      title: "Cholesterol Synthesis & Regulation"
      text: >
        All 27 carbons from acetyl-CoA. Pathway: acetyl-CoA â†’ HMG-CoA â†’ mevalonate (HMG-CoA reductase,
        rate-limiting, target of statins) â†’ squalene â†’ lanosterol â†’ cholesterol. Occurs in cytoplasm/ER.
        Regulation: SREBP-2 (â†‘transcription when cholesterol â†“), insulin (â†‘), glucagon/statins (â†“).
        Cholesterol â†’ bile acids (7Î±-hydroxylase, rate-limiting), steroid hormones, vitamin D.
        Lipoproteins: chylomicrons (dietary TG), VLDL (liver TG), LDL (cholesterol delivery, "bad"),
        HDL (reverse cholesterol transport, "good"). LDL receptor deficiency = familial hypercholesterolemia.
        đź“š Harper's Biochemistry, 31st Ed, Ch.26

  clinical:
    - title: "Clinical Correlation: MCAD Deficiency"
      text: >
        Medium-chain acyl-CoA dehydrogenase deficiency â€” most common fatty acid oxidation disorder.
        Presents with hypoketotic hypoglycemia during fasting, hepatomegaly, elevated C8-C10 acylcarnitines.
        Can cause sudden death in infants. Avoid fasting; frequent feeds.
    - title: "Clinical Correlation: Familial Hypercholesterolemia"
      text: >
        Autosomal dominant LDL receptor mutation. Heterozygotes: LDL ~300 mg/dL, tendon xanthomas,
        premature atherosclerosis. Homozygotes: LDL >600, MI in childhood. Treatment: high-dose statins, PCSK9 inhibitors.

