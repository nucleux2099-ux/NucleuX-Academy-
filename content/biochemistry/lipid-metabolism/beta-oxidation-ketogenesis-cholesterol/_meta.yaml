mcqs:
  - question: "The rate-limiting enzyme of fatty acid beta-oxidation is:"
    options:
      - "Acyl-CoA dehydrogenase"
      - "Carnitine palmitoyltransferase I (CPT-I)"
      - "Thiolase"
      - "HMG-CoA synthase"
    answer: "Carnitine palmitoyltransferase I (CPT-I)"
    explanation: >
      CPT-I on the outer mitochondrial membrane is rate-limiting for long-chain FA entry into
      mitochondria. It is inhibited by malonyl-CoA (first committed intermediate of FA synthesis).
      đź“š Harper's Biochemistry, 31st Ed, Ch.22
    difficulty: 1

  - question: "Why can't the liver utilize ketone bodies for energy?"
    options:
      - "Lacks HMG-CoA lyase"
      - "Lacks thiophorase (succinyl-CoA:acetoacetate CoA transferase)"
      - "Lacks Î˛-hydroxybutyrate dehydrogenase"
      - "Lacks acetyl-CoA"
    answer: "Lacks thiophorase (succinyl-CoA:acetoacetate CoA transferase)"
    explanation: >
      Thiophorase converts acetoacetate back to acetoacetyl-CoA for utilization. The liver lacks
      this enzyme, so it produces ketone bodies for export to extrahepatic tissues (brain, heart, muscle).
      đź“š Harper's Biochemistry, 31st Ed, Ch.22
    difficulty: 2

  - question: "A child presents with hypoketotic hypoglycemia during fasting. The most likely diagnosis is:"
    options:
      - "Type 1 diabetes mellitus"
      - "MCAD deficiency"
      - "Carnitine deficiency"
      - "HMG-CoA lyase deficiency"
    answer: "MCAD deficiency"
    explanation: >
      MCAD deficiency is the most common fatty acid oxidation disorder. Impaired beta-oxidation
      â†’ cannot generate ketone bodies (hypoketotic) and cannot provide fuel during fasting â†’ hypoglycemia.
      đź“š Harper's Biochemistry, 31st Ed, Ch.22
    difficulty: 2

  - question: "Which lipoprotein is responsible for reverse cholesterol transport?"
    options:
      - "LDL"
      - "VLDL"
      - "HDL"
      - "Chylomicrons"
    answer: "HDL"
    explanation: >
      HDL picks up cholesterol from peripheral tissues and transports it back to the liver for
      excretion as bile acids â€” reverse cholesterol transport. This is why high HDL is protective.
      đź“š Harper's Biochemistry, 31st Ed, Ch.26
    difficulty: 1

  - question: "Malonyl-CoA inhibits beta-oxidation by acting on which enzyme?"
    options:
      - "CPT-I"
      - "CPT-II"
      - "Acyl-CoA dehydrogenase"
      - "HMG-CoA reductase"
    answer: "CPT-I"
    explanation: >
      Malonyl-CoA (first intermediate of fatty acid synthesis) inhibits CPT-I, preventing FA entry
      into mitochondria for oxidation. This ensures FA synthesis and oxidation don't occur simultaneously.
      đź“š Stryer Biochemistry, Ch.22
    difficulty: 1
