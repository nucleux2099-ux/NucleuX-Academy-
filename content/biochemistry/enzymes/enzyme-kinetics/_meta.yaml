topic_id: enzyme-kinetics
name: "Enzyme Kinetics (Michaelis-Menten, Lineweaver-Burk)"
description: >
  Comprehensive review of enzyme kinetics including Michaelis-Menten equation, Lineweaver-Burk plots,
  enzyme inhibition types, and clinical applications of enzyme assays.
