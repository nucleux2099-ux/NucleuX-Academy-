      text: "Describe the applied anatomy and physiology of esophagus"
      domain: "K"
    - code: "PY4.9"
      text: "Discuss the physiology aspects of: peptic ulcer, gastro-oesophageal reflux disease, vomiting, diarrhoea, constipation, Adynamic ileus, Hirschsprung's disease"
      domain: "KH"
  prerequisite_details:
    - slug: "esophageal-anatomy"
      reason: "Diaphragmatic crural anatomy and GEJ structure form the anatomical basis of the anti-reflux barrier"
  related_details:
    - slug: "gerd"
      reason: "LES hypotension and transient LES relaxations are the primary pathophysiological mechanisms of GERD"
      relationship: "clinical"
    - slug: "achalasia"
      reason: "Failed LES relaxation due to myenteric plexus degeneration defines achalasia"
      relationship: "clinical"
    - slug: "dysphagia"
      reason: "LES dysfunction manifests as dysphagia — understanding physiology explains symptom mechanisms"
      relationship: "clinical"
    - slug: "fundoplication"
      reason: "Fundoplication augments the LES anti-reflux barrier by wrapping gastric fundus around the GEJ"
      relationship: "clinical"
    - slug: "heller-myotomy"
      reason: "Myotomy disrupts hypertensive LES in achalasia — directly targets LES pathology"
      relationship: "clinical"
