      reason: "Dysphagia classification depends on distinguishing motility disorders from mechanical obstruction"
      relationship: "foundation"
    - slug: "esophageal-manometry"
      reason: "Manometry is the key investigation for motility-related dysphagia"
      relationship: "clinical"
