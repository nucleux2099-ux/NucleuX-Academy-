title: "Obstructive Jaundice"
slug: obstructive-jaundice
depth: "UG"
highYield: true
nmc_codes:
  - "SU28.12"
  - "PA25.1"
  - "PA25.6"
  - "IM5.13"
  - "IM5.14"
prerequisites:
  - "liver-anatomy"
  - "acute-cholecystitis"
related_topics:
  - "choledocholithiasis"
  - "cholangitis"
  - "gallbladder-cancer"
