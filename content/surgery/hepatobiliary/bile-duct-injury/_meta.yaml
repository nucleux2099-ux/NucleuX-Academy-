title: "Bile Duct Injury"
slug: bile-duct-injury
depth: "UG"
highYield: true
nmc_codes:
  - "SU28.12"
prerequisites:
  - "liver-anatomy"
  - "cholelithiasis"
related_topics:
  - "cholangitis"
  - "biliary-stricture"
  - "obstructive-jaundice"
