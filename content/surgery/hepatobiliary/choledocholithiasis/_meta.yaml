title: "Choledocholithiasis"
slug: choledocholithiasis
depth: "UG"
highYield: true
nmc_codes:
  - "SU28.12"
  - "IM5.8"
  - "IM5.13"
prerequisites:
  - "cholelithiasis"
  - "obstructive-jaundice"
  - "liver-anatomy"
related_topics:
  - "cholangitis"
  - "acute-cholecystitis"
  - "biliary-stricture"
