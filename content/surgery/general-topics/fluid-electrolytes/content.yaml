overview: |
  Fluid and electrolyte balance is fundamental to surgical practice. The body is 60% water (TBW), distributed
  between intracellular (2/3) and extracellular (1/3) compartments. Understanding daily requirements, common
  electrolyte disorders, and their surgical causes enables safe perioperative fluid management.

learning_objectives:
  - Describe body fluid compartments and their composition
  - Calculate daily fluid and electrolyte requirements
  - Recognize and manage hyponatremia and hyperkalemia
  - Understand acid-base disturbances in surgical patients
  - Apply appropriate fluid therapy in perioperative settings

content:
  atoms:
    - title: Body Fluid Compartments
      text: |
        **TBW:** 60% body weight (higher in lean, lower in obese/elderly/females).
        **ICF (2/3 of TBW):** Major cation K+, major anion PO4³⁻/proteins.
        **ECF (1/3 of TBW):** Interstitial (75% of ECF) + Intravascular/Plasma (25% of ECF).
        Major cation Na+, major anion Cl⁻/HCO3⁻.
        **Daily requirements:** Water: 30-35 mL/kg/day. Na+: 1-2 mmol/kg/day. K+: 1 mmol/kg/day.
        📚 Bailey & Love, 28th Ed, Ch.17; Sabiston, 21st Ed, Ch.3

    - title: IV Fluids
      text: |
        **Normal Saline (0.9% NaCl):** Na+ 154, Cl⁻ 154 mmol/L. Isotonic. Risk of hyperchloremic
        metabolic acidosis with large volumes. Used for resuscitation and Na+ replacement.
        **Ringer's Lactate (Hartmann's):** Na+ 131, K+ 5, Ca²+ 2, Cl⁻ 111, Lactate 29. Most physiological.
        Preferred resuscitation fluid. Avoid in hyperkalemia and liver failure (can't metabolize lactate).
        **5% Dextrose:** Provides free water (distributes to all compartments). No electrolytes.
        Used for maintenance water but NOT for resuscitation (no volume expansion).
        **Colloids:** Albumin, gelatin, HES. Stay in intravascular space longer. For volume expansion.
        📚 Sabiston, 21st Ed, Ch.3

    - title: Sodium Disorders
      text: |
        **Hyponatremia (<135 mmol/L):** MC electrolyte disorder in hospitalized patients.
        Surgical causes: Excessive hypotonic fluids, SIADH (post-op, head injury), third-space losses.
        Symptoms: Confusion, seizures, coma (when <120). Treatment: Fluid restrict if euvolemic (SIADH),
        NS if hypovolemic. Correct slowly (<8-10 mmol/24h) to avoid central pontine myelinolysis (osmotic demyelination).
        **Hypernatremia (>145 mmol/L):** Water deficit. Diabetes insipidus, inadequate intake.
        Treatment: Slow correction with free water (5% dextrose).
        📚 Bailey & Love, 28th Ed, Ch.17

    - title: Potassium Disorders
      text: |
        **Hypokalemia (<3.5 mmol/L):** Causes: Vomiting (pyloric stenosis), diarrhea, diuretics, alkalosis.
        ECG: Flattened T waves, U waves, ST depression. Treatment: Oral/IV KCl (max 20 mmol/hr IV, never push).
        **Hyperkalemia (>5.5 mmol/L):** Causes: Renal failure, crush injury, massive transfusion, acidosis,
        succinylcholine, potassium-sparing diuretics.
        ECG: Tall peaked T waves → widened QRS → sine wave → cardiac arrest.
        **Emergency treatment:** IV calcium gluconate (cardioprotection, first step), insulin + dextrose
        (drives K+ into cells), salbutamol nebulizer, calcium resonium/sodium polystyrene (eliminate K+), dialysis.
        📚 Sabiston, 21st Ed, Ch.3

    - title: Acid-Base in Surgery
      text: |
        **Metabolic acidosis (low HCO3⁻):** Shock, sepsis, renal failure, DKA, diarrhea. High anion gap (MUDPILES)
        vs normal anion gap. Treat cause.
        **Metabolic alkalosis (high HCO3⁻):** Vomiting/NG suction (loss of HCl), pyloric stenosis (hypochloremic
        hypokalemic metabolic alkalosis with paradoxical aciduria). Treat with NS + KCl.
        **Respiratory acidosis:** Hypoventilation. **Respiratory alkalosis:** Hyperventilation (pain, anxiety).
        **Pyloric stenosis alkalosis mechanism:** Loss of H+ and Cl⁻ → alkalosis. Kidney retains Na+ with HCO3⁻
        (not Cl⁻) → worsens alkalosis. When K+ drops, kidney exchanges Na+ for H+ → paradoxical aciduria.
        📚 Bailey & Love, 28th Ed, Ch.17

  clinical: |
    **Perioperative Fluid Management:**
    1. Maintenance: 25-30 mL/kg/day (1 mmol/kg Na+ and K+)
    2. Replace losses: Measure NG output, drain output, urine, insensible losses
    3. Resuscitation: Ringer's lactate or NS boluses (20 mL/kg)
    4. Monitor: Daily weights, urine output, electrolytes, fluid balance chart
    5. Post-op: Restrict fluids to maintenance, avoid excess NS (ERAS protocol)
    6. Check electrolytes daily in surgical patients

  high_yield_points:
    - "TBW = 60% body weight; ICF = 2/3 TBW; ECF = 1/3 TBW"
    - "MC cation in ICF: K+; MC cation in ECF: Na+"
    - "MC electrolyte disorder in hospitalized patients: Hyponatremia"
    - "Rapid correction of hyponatremia causes central pontine myelinolysis"
    - "Hyperkalemia ECG: Tall peaked T waves → widened QRS → sine wave → arrest"
    - "First step in hyperkalemia emergency: IV calcium gluconate (cardioprotection)"
    - "Pyloric stenosis: Hypochloremic hypokalemic metabolic alkalosis with paradoxical aciduria"
    - "Ringer's lactate: Most physiological resuscitation fluid"
    - "Normal saline: Risk of hyperchloremic metabolic acidosis with large volumes"
    - "5% Dextrose distributes to ALL compartments — not useful for volume resuscitation"

mcqs:
  - question: "A patient with pyloric stenosis presents with persistent vomiting. What is the expected acid-base disturbance?"
    options:
      a: Metabolic acidosis
      b: Hypochloremic hypokalemic metabolic alkalosis
      c: Respiratory alkalosis
      d: Respiratory acidosis
    answer: b
    explanation: |
      Pyloric stenosis causes loss of gastric HCl → hypochloremia + metabolic alkalosis.
      Associated hypokalemia (renal K+ loss) and paradoxical aciduria (kidney excretes H+ to
      preserve K+ and Na+). Correct with IV NS + KCl. 📚 Bailey & Love, 28th Ed, Ch.17

  - question: "The first step in management of severe hyperkalemia (K+ 7.2 mmol/L) with ECG changes is:"
    options:
      a: IV insulin with dextrose
      b: IV calcium gluconate
      c: Oral calcium resonium
      d: Salbutamol nebulizer
    answer: b
    explanation: |
      IV calcium gluconate is the FIRST step — it stabilizes the cardiac membrane and protects against
      arrhythmias (does NOT lower K+ levels). Then insulin+dextrose to shift K+ intracellularly.
      Calcium resonium/dialysis to actually remove K+ from body. 📚 Sabiston, 21st Ed, Ch.3

  - question: "Which IV fluid is most physiological and preferred for resuscitation?"
    options:
      a: Normal saline
      b: 5% Dextrose
      c: Ringer's lactate
      d: 3% Hypertonic saline
    answer: c
    explanation: |
      Ringer's lactate has electrolyte composition closest to plasma. It avoids hyperchloremic acidosis
      seen with NS. Preferred for surgical resuscitation. Avoid in hyperkalemia (contains 5 mmol/L K+).
      📚 Sabiston, 21st Ed, Ch.3

  - question: "Rapid correction of hyponatremia can cause:"
    options:
      a: Cerebral edema
      b: Central pontine myelinolysis
      c: Renal tubular acidosis
      d: Hyperkalemia
    answer: b
    explanation: |
      Central pontine myelinolysis (osmotic demyelination syndrome) occurs when chronic hyponatremia
      is corrected too rapidly (>8-10 mmol/L in 24h). Causes quadriplegia, pseudobulbar palsy.
      Slow correction is essential. 📚 Bailey & Love, 28th Ed, Ch.17

  - question: "Normal saline (0.9% NaCl) has a pH around 5.5 and can cause which acid-base disturbance with large volume infusion?"
    options:
      a: Metabolic alkalosis
      b: Respiratory acidosis
      c: Hyperchloremic metabolic acidosis
      d: Respiratory alkalosis
    answer: c
    explanation: |
      NS has supraphysiological chloride (154 mmol/L vs plasma 100). Large volumes cause hyperchloremic
      normal anion gap metabolic acidosis. This is why Ringer's lactate is preferred for large-volume
      resuscitation. 📚 Sabiston, 21st Ed, Ch.3
