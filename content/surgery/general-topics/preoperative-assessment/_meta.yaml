  prerequisite_details:
    - slug: "homeostasis"
      reason: "Preoperative assessment evaluates the patient's metabolic and physiological reserve; understanding homeostatic mechanisms helps identify patients at risk for decompensation under surgical stress"
    - slug: "surgical-ethics"
      reason: "Informed consent is a mandatory ethical and legal prerequisite before any surgical procedure; understanding autonomy, beneficence, and capacity assessment is integral to preoperative evaluation"
  related_details:
    - slug: "perioperative-management"
      reason: "Preoperative assessment findings directly dictate the perioperative plan including monitoring level, fluid strategy, and anesthesia choice"
      relationship: "clinical"
    - slug: "blood-transfusion"
      reason: "Preoperative hemoglobin assessment and blood typing/crossmatching determine transfusion readiness for anticipated surgical blood loss"
      relationship: "clinical"
    - slug: "investigations-imaging"
      reason: "Preoperative workup relies on interpreting baseline blood tests (CBC, RFT, LFT, coagulation), ECG, chest X-ray, and risk-specific imaging to stratify surgical risk"
      relationship: "clinical"
