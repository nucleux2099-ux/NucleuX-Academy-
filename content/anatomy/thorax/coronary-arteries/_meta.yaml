topic_id: coronary-arteries
name: Blood Supply of Heart (Coronary Arteries)
description: Blood Supply of Heart — Coronary artery anatomy, dominance, territories, and clinical correlations
high_yield: true
nmc_codes:
- code: AN22.5
  domain: KH
  core: true
  phase: Phase 1

overview: >
  The heart is supplied by the right coronary artery (RCA) and left coronary artery (LCA), both arising from
  the ascending aorta just above the aortic valve cusps (sinuses of Valsalva). The LCA divides into the left
  anterior descending (LAD) and left circumflex (LCx) arteries. Coronary dominance is determined by which artery
  gives rise to the posterior descending artery (PDA) — right dominant in 85%, left in 10%, co-dominant in 5%.
  📚 Gray's Anatomy, 42nd Ed, Ch.56; 📚 Netter's Atlas, 6th Ed, Plates 212-214

learning_objectives:
  - Describe the origin, course, and branches of the right and left coronary arteries
  - Define coronary dominance and its clinical significance
  - Correlate coronary artery territories with myocardial segments
  - Explain the anatomical basis of myocardial infarction patterns
  - Describe the venous drainage of the heart

content:
  atoms:
    - id: left-coronary-artery
      title: "Left Coronary Artery (LCA)"
      text: >
        Arises from left aortic sinus (sinus of Valsalva). Main stem (left main) is 1-2 cm, passes behind
        pulmonary trunk, bifurcates into: LAD (anterior interventricular) — runs in anterior interventricular
        groove to apex, gives septal perforators (supply anterior 2/3 of interventricular septum) and diagonal
        branches (supply anterior LV wall). LCx — runs in left AV groove, gives obtuse marginal branches
        (supply lateral LV wall). LAD is the "artery of sudden death" — occlusion causes massive anterior MI.
        📚 Netter's Atlas, 6th Ed, Plate 212; 📚 Gray's Anatomy, 42nd Ed

    - id: right-coronary-artery
      title: "Right Coronary Artery (RCA)"
      text: >
        Arises from right aortic sinus. Runs in right AV groove. Branches: SA nodal artery (60% from RCA),
        right marginal artery, posterior descending artery (PDA, in 85% — right dominant), AV nodal artery
        (80% from RCA via PDA). PDA runs in posterior interventricular groove, supplies posterior 1/3 of septum
        and inferior LV wall. RCA occlusion → inferior MI + AV node block (1st/2nd degree).
        📚 Gray's Anatomy, 42nd Ed, Ch.56

    - id: coronary-dominance
      title: "Coronary Dominance"
      text: >
        Determined by which artery gives the PDA: Right dominant (85%) — PDA from RCA.
        Left dominant (10%) — PDA from LCx. Co-dominant (5%) — PDA from both.
        Clinical significance: In right dominant hearts, RCA occlusion affects inferior wall + AV node.
        In left dominant hearts, LCx occlusion can cause inferior MI + AV block.
        The SA node is supplied by RCA in 60% and LCx in 40%.
        📚 Netter's Atlas, 6th Ed; 📚 Gray's Anatomy, 42nd Ed

    - id: venous-drainage
      title: "Venous Drainage of the Heart"
      text: >
        Coronary sinus: main venous drainage, runs in posterior AV groove, opens into right atrium.
        Tributaries: great cardiac vein (alongside LAD), middle cardiac vein (alongside PDA), small cardiac
        vein (alongside RCA), posterior vein of left ventricle, oblique vein of left atrium (Marshall).
        Anterior cardiac veins: drain directly into right atrium (not via coronary sinus).
        Thebesian veins (venae cordis minimae): drain directly into all 4 chambers.
        📚 Gray's Anatomy, 42nd Ed, Ch.56

  clinical:
    - title: "Clinical: Coronary Artery Territories & MI"
      text: >
        LAD occlusion → anterior wall MI (leads V1-V4), anterior septal. Most common cause of cardiogenic shock.
        RCA occlusion → inferior wall MI (leads II, III, aVF) ± RV infarction ± AV block.
        LCx occlusion → lateral wall MI (leads I, aVL, V5-V6). Most commonly "silent" in ECG.
        Diagonal branch occlusion → anterolateral MI. Septal perforator occlusion → septal MI with bundle branch block.
    - title: "Clinical: Coronary Artery Bypass & Stenting"
      text: >
        LAD is most commonly bypassed with left internal thoracic (mammary) artery — best long-term patency.
        RCA and LCx usually bypassed with saphenous vein grafts. Coronary angiography uses Judkins technique.

high_yield_points:
  - "LAD = 'artery of sudden death' / 'widow maker' — supplies anterior LV + anterior 2/3 septum"
  - "Right dominant circulation in 85% — RCA gives PDA"
  - "SA node: RCA (60%), LCx (40%); AV node: RCA (80%)"
  - "RCA occlusion → inferior MI + AV block"
  - "LAD occlusion → anterior MI + cardiogenic shock"
  - "Coronary sinus opens into RIGHT atrium"
  - "Anterior cardiac veins drain directly into right atrium (not via coronary sinus)"
  - "Thebesian veins drain into all 4 chambers"
  - "Left main coronary artery = 1-2 cm, bifurcates into LAD + LCx"
  - "Septal perforators (from LAD) supply anterior 2/3 of interventricular septum"

mcqs:
  - question: "Which coronary artery is known as the 'artery of sudden death'?"
    options:
      - "Right coronary artery"
      - "Left circumflex artery"
      - "Left anterior descending artery"
      - "Posterior descending artery"
    answer: "Left anterior descending artery"
    explanation: >
      LAD supplies the largest territory of myocardium (anterior wall + anterior 2/3 of septum). Its occlusion
      causes massive anterior MI with highest risk of cardiogenic shock and sudden death.
      📚 Netter's Atlas, 6th Ed
    difficulty: 1

  - question: "In the most common pattern of coronary dominance, the posterior descending artery arises from:"
    options:
      - "Left anterior descending artery"
      - "Left circumflex artery"
      - "Right coronary artery"
      - "Left main coronary artery"
    answer: "Right coronary artery"
    explanation: >
      Right dominance (85%) means the PDA arises from the RCA. Left dominance (10%) has PDA from LCx.
      The PDA runs in the posterior interventricular groove and supplies the posterior 1/3 of the interventricular septum.
      📚 Gray's Anatomy, 42nd Ed
    difficulty: 1

  - question: "The SA node is most commonly supplied by a branch of:"
    options:
      - "Left anterior descending artery"
      - "Left circumflex artery"
      - "Right coronary artery"
      - "Posterior descending artery"
    answer: "Right coronary artery"
    explanation: >
      The SA nodal artery arises from the RCA in 60% and from LCx in 40%. Similarly, the AV nodal artery
      arises from the RCA (via PDA) in 80% of cases. RCA occlusion can therefore cause SA/AV node dysfunction.
      📚 Gray's Anatomy, 42nd Ed
    difficulty: 1

  - question: "The coronary sinus drains into which chamber of the heart?"
    options:
      - "Left atrium"
      - "Right atrium"
      - "Left ventricle"
      - "Right ventricle"
    answer: "Right atrium"
    explanation: >
      The coronary sinus runs in the posterior AV groove and opens into the right atrium between the opening of
      the IVC and the tricuspid valve. Its opening is guarded by the valve of Thebesius.
      📚 Gray's Anatomy, 42nd Ed, Ch.56
    difficulty: 1

  - question: "A patient with inferior wall MI on ECG (ST elevation in II, III, aVF) develops complete heart block. Which artery is most likely occluded?"
    options:
      - "Left anterior descending"
      - "Left circumflex"
      - "Right coronary artery"
      - "Diagonal branch"
    answer: "Right coronary artery"
    explanation: >
      RCA supplies the inferior wall of the LV (via PDA) and the AV node (in 80%). Occlusion causes inferior MI
      (II, III, aVF) with AV nodal block. LAD causes anterior MI. LCx causes lateral MI.
      📚 Netter's Atlas, 6th Ed; 📚 Gray's Anatomy, 42nd Ed
    difficulty: 2
