topic_id: national-health-programs
name: National Health Programs
description: Major national health programs of India — objectives, strategies, targets, and achievements
high_yield: true

overview: >
  India has numerous national health programs targeting communicable diseases, non-communicable diseases, maternal
  and child health, and nutrition. Key programs include NTEP (TB), NVBDCP (vector-borne), NACP (AIDS),
  NLEP (leprosy), NPCDCS (NCDs), and many others. These are frequently tested in exams and essential for
  community medicine practice.
  📚 Park's Textbook of PSM, 26th Ed, Ch.8-12 (p.180-350)

learning_objectives:
  - Enumerate major national health programs of India
  - Describe objectives and strategies of key programs
  - Know the current targets and indicators
  - Understand the organizational structure of health programs
  - Discuss achievements and challenges

content:
  atoms:
    - id: ntep
      title: "National TB Elimination Programme (NTEP)"
      text: >
        Formerly RNTCP (revised 2020). Goal: TB elimination by 2025 (India's target, ahead of global 2030).
        Strategy: DOTS (Directly Observed Treatment, Short-course). Diagnosis: CBNAAT/Truenat (replacing
        sputum microscopy as primary test). Treatment: daily fixed-dose regimen (replaced intermittent).
        Cat I: new cases (2HRZE/4HRE). Drug-resistant TB: longer regimen with second-line drugs.
        Nikshay portal: online case notification. Nikshay Poshan Yojana: ₹500/month nutrition support.
        📚 Park's Textbook of PSM, 26th Ed, Ch.9 (p.200-230)

    - id: nacp
      title: "National AIDS Control Programme (NACP)"
      text: >
        NACP Phase V (current). Managed by NACO (National AIDS Control Organisation).
        Strategies: targeted interventions for high-risk groups (FSW, MSM, IDU, truckers), ICTC (testing),
        ART centers, PPTCT (prevention of parent-to-child transmission), blood safety, IEC.
        India goal: 90-90-90 targets (90% know status, 90% on ART, 90% viral suppression).
        NACO estimates: HIV prevalence ~0.21% in adults (2021).
        📚 Park's Textbook of PSM, 26th Ed, Ch.10 (p.335-350)

    - id: nvbdcp
      title: "National Vector Borne Disease Control Programme (NVBDCP)"
      text: >
        Covers: malaria, dengue, chikungunya, kala-azar, Japanese encephalitis, lymphatic filariasis.
        Malaria: goal of elimination by 2030. Strategies — IRS (indoor residual spraying), LLIN (long-lasting
        insecticidal nets), rapid diagnostic tests (RDTs), ACT (artemisinin-based combination therapy) for P. falciparum.
        Kala-azar: elimination target (<1/10,000 at sub-district level). Treatment: liposomal amphotericin B.
        JE: vaccination in endemic areas.
        📚 Park's Textbook of PSM, 26th Ed, Ch.8 (p.180-200)

    - id: nlep
      title: "National Leprosy Eradication Programme (NLEP)"
      text: >
        India achieved leprosy elimination (<1/10,000 at national level) in 2005. But pockets persist.
        WHO MDT regimen: PB (paucibacillary): dapsone + rifampicin × 6 months.
        MB (multibacillary): dapsone + rifampicin + clofazimine × 12 months.
        Single dose ROM (rifampicin + ofloxacin + minocycline) for single skin lesion PB.
        Disability prevention and medical rehabilitation (DPMR) is a key component.
        📚 Park's Textbook of PSM, 26th Ed, Ch.9 (p.280-295)

    - id: npcdcs
      title: "NCD Programs (NPCDCS)"
      text: >
        National Programme for Prevention and Control of Cancer, Diabetes, CVD and Stroke (NPCDCS).
        Focus: population-based screening (30+ years) at HWCs (Health & Wellness Centers) under AB-HWC.
        Components: health promotion, opportunistic screening, referral, treatment. NCD clinics at CHC/DH.
        Other: NMHP (Mental Health), NPHCE (Health Care of Elderly), NPPC (Palliative Care).
        Ayushman Bharat: (1) HWC — comprehensive primary care; (2) PM-JAY — ₹5 lakh health insurance.
        📚 Park's Textbook of PSM, 26th Ed, Ch.12 (p.340-350)

  clinical:
    - title: "Clinical Correlation: DOTS Strategy Success"
      text: >
        DOTS (Directly Observed Treatment, Short-course) is the cornerstone of TB control. Direct observation
        ensures adherence, reducing drug resistance. India's RNTCP/NTEP achieved >85% treatment success rate.
        However, MDR-TB and XDR-TB remain challenges. Daily regimen replaced intermittent in 2017.

high_yield_points:
  - "India's TB elimination target: 2025 (NTEP, ahead of global 2030)"
  - "CBNAAT/Truenat replaced sputum microscopy as primary TB diagnostic"
  - "DOTS: daily fixed-dose regimen (Cat I: 2HRZE/4HRE)"
  - "Leprosy elimination achieved at national level in 2005 (<1/10,000)"
  - "WHO MDT: PB = dapsone + rifampicin (6 months); MB = add clofazimine (12 months)"
  - "NACP: 90-90-90 targets for HIV"
  - "Malaria elimination target: 2030; ACT for P. falciparum"
  - "Kala-azar elimination: <1/10,000 at sub-district level; Rx: liposomal amphotericin B"
  - "Ayushman Bharat: HWC (primary care) + PM-JAY (₹5 lakh insurance)"
  - "Nikshay Poshan Yojana: ₹500/month nutrition support for TB patients"

mcqs:
  - question: "India's target year for TB elimination under NTEP is:"
    options:
      - "2025"
      - "2030"
      - "2035"
      - "2040"
    answer: "2025"
    explanation: >
      India set an ambitious target of TB elimination by 2025, five years ahead of the global SDG target of 2030.
      The National Strategic Plan 2017-2025 guides this effort.
      📚 Park's Textbook of PSM, 26th Ed, Ch.9 (p.202)
    difficulty: 1

  - question: "The drug added in multibacillary (MB) leprosy regimen compared to paucibacillary (PB) is:"
    options:
      - "Rifampicin"
      - "Dapsone"
      - "Clofazimine"
      - "Ofloxacin"
    answer: "Clofazimine"
    explanation: >
      PB regimen: dapsone + rifampicin (6 months). MB regimen adds clofazimine to dapsone and rifampicin
      (12 months). Clofazimine has anti-mycobacterial and anti-inflammatory properties.
      📚 Park's Textbook of PSM, 26th Ed, Ch.9 (p.288)
    difficulty: 1

  - question: "The 90-90-90 targets in NACP refer to:"
    options:
      - "90% vaccination, 90% treatment, 90% cure"
      - "90% know status, 90% on ART, 90% viral suppression"
      - "90% testing, 90% counseling, 90% follow-up"
      - "90% prevention, 90% detection, 90% treatment"
    answer: "90% know status, 90% on ART, 90% viral suppression"
    explanation: >
      UNAIDS 90-90-90 targets: 90% of PLHIV know their status, 90% of diagnosed are on ART,
      90% of those on ART achieve viral suppression. Updated to 95-95-95 for 2025.
      📚 Park's Textbook of PSM, 26th Ed, Ch.10 (p.340)
    difficulty: 1

  - question: "First-line treatment for kala-azar under NVBDCP is:"
    options:
      - "Sodium stibogluconate"
      - "Miltefosine"
      - "Liposomal amphotericin B"
      - "Pentamidine"
    answer: "Liposomal amphotericin B"
    explanation: >
      Liposomal amphotericin B (single dose 10mg/kg) is now the first-line treatment for visceral
      leishmaniasis (kala-azar) in India, replacing sodium stibogluconate due to resistance.
      📚 Park's Textbook of PSM, 26th Ed, Ch.8 (p.195)
    difficulty: 2

  - question: "Ayushman Bharat scheme has two components:"
    options:
      - "ASHA + ANM"
      - "Health & Wellness Centers + PM-JAY"
      - "PHC + CHC"
      - "RSBY + NHPS"
    answer: "Health & Wellness Centers + PM-JAY"
    explanation: >
      Ayushman Bharat (2018) has two pillars: (1) AB-HWC — upgrading 1.5 lakh sub-centers/PHCs to
      Health & Wellness Centers for comprehensive primary care; (2) PM-JAY — ₹5 lakh health insurance
      cover per family per year for secondary/tertiary hospitalization.
      📚 Park's Textbook of PSM, 26th Ed, Ch.12 (p.348)
    difficulty: 1
